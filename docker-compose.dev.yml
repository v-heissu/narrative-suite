services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: build
    volumes:
      - ./backend:/src
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    command: ["dotnet", "watch", "run", "--project", "NarrativeSuite.Api", "--urls", "http://+:5080"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/static:/app/static
    command: ["bun", "run", "dev", "--host", "0.0.0.0", "--port", "3000"]
